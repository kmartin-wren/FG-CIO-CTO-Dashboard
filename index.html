<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FG CIO/CTO Texting Campaign</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f9; color: #1a1a2e; }

    header {
      background: #1a1a2e;
      color: white;
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
    header span { font-size: 13px; opacity: 0.6; }

    .stats-bar {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 40px;
      display: flex;
      gap: 40px;
    }
    .stat { text-align: center; }
    .stat .num { font-size: 28px; font-weight: 700; color: #1a1a2e; }
    .stat .label { font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    .toolbar {
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .toolbar h2 { font-size: 16px; font-weight: 600; color: #374151; }

    .btn-copy {
      background: #1a1a2e;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn-copy:hover { background: #2d2d4e; }
    .btn-copy.copied { background: #16a34a; }

    .contact-list {
      padding: 0 40px 40px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .contact-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: box-shadow 0.15s;
    }
    .contact-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }

    .contact-left { display: flex; flex-direction: column; gap: 4px; }
    .contact-name { font-size: 16px; font-weight: 700; color: #111827; }
    .contact-meta { font-size: 13px; color: #6b7280; }
    .contact-company { font-weight: 600; color: #374151; }

    .contact-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .phone-badge {
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      font-weight: 600;
    }
    .phone-badge.mobile {
      background: #eff6ff;
      color: #2563eb;
      border-color: #bfdbfe;
    }
    .phone-type { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; }

    .copy-line {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #9ca3af;
      margin-top: 4px;
    }

    .section-label {
      padding: 8px 40px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9ca3af;
    }

    #keith-export {
      display: none;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      margin: 0 40px 40px;
      padding: 20px;
    }
    #keith-export h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: #374151; }
    #keith-export pre {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.9;
      color: #111827;
      white-space: pre-wrap;
    }
    .btn-show-export {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #d1d5db;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .btn-show-export:hover { background: #e5e7eb; }

    .no-phone { display: none; }
  </style>
</head>
<body>

<header>
  <h1>FG CIO/CTO Texting Campaign List</h1>
  <span>Pulled live from HubSpot &bull; Generated June 23, 2026</span>
</header>

<div class="stats-bar">
  <div class="stat"><div class="num" id="total-count">21</div><div class="label">Total Contacts</div></div>
  <div class="stat"><div class="num" id="phone-count">21</div><div class="label">Have Phone</div></div>
  <div class="stat"><div class="num">CIO · CTO · CDO · CAO</div><div class="label">Title Types</div></div>
</div>

<div class="toolbar">
  <h2>Keith-Ready Texting List</h2>
  <div style="display:flex;gap:10px;">
    <button class="btn-show-export" onclick="toggleExport()">Show Keith Export</button>
    <button class="btn-copy" id="copy-btn" onclick="copyAll()">Copy All for Keith</button>
  </div>
</div>

<div class="contact-list" id="contact-list"></div>

<div id="keith-export">
  <h3>Keith-Ready Export — copy and send directly:</h3>
  <pre id="export-text"></pre>
</div>

<script>
const contacts = [
  { name: "Robert Oh", company: "International Motors", title: "Chief Digital Information Officer", phone: "+1 331 332 2310", mobile: true },
  { name: "Paul Hlivko", company: "Wellmark Blue Cross Blue Shield", title: "EVP, Chief Information & Digital Officer", phone: "515-376-4945", mobile: false },
  { name: "Ghada Ijam", company: "Federal Reserve System", title: "Chief Information Officer", phone: "+1 804 572 1695", mobile: false },
  { name: "Mark Johnson", company: "Kearney", title: "Partner, Chief Information and Digital Officer", phone: "+44 7341 128777", mobile: true },
  { name: "Shane Neman", company: "Shane Neman", title: "Chief Information Officer", phone: "(917) 834-3207", mobile: true },
  { name: "Kush Bavaria", company: "Ornn AI", title: "Chief Technology Officer", phone: "512-781-0303", mobile: false },
  { name: "Venky Rangachari", company: "HPE Networking", title: "Chief Information Officer", phone: "408-477-9138", mobile: false },
  { name: "Nina Tatsiy", company: "Quadient", title: "Chief Information Officer", phone: "+44 07435 975347", mobile: true },
  { name: "Iwo Szapar", company: "Remote-How", title: "Chief AI Officer", phone: "+48 668 282 628", mobile: true },
  { name: "Ed Lovely", company: "IBM Corp", title: "Vice President & Chief Data Officer", phone: "203-770-3819", mobile: false },
  { name: "Grant Ries", company: "T-Mobile", title: "SVP and Chief Data and AI Officer", phone: "206-549-2117", mobile: false },
  { name: "Greg Ulrich", company: "Mastercard", title: "Chief AI and Data Officer", phone: "+1 914-441-2952", mobile: true },
  { name: "Alex Alonso", company: "SHRM", title: "Chief Data & Analytics Officer", phone: "+1 703-535-6403", mobile: false },
  { name: "Bernd Bucher", company: "Novartis", title: "Chief Information Officer & Global Head Data, Digital & IT", phone: "+41 61 324 59 34", mobile: false },
  { name: "Pascale Hutz", company: "American Express", title: "Chief Data Officer, EVP Enterprise Digital & Data Solutions", phone: "914-525-2714", mobile: false },
  { name: "Tim Carmichael", company: "Chalhoub Group", title: "Chief Data Officer", phone: "+971 58 500 9166", mobile: true },
  { name: "Jeff Hawkins", company: "Hartford Financial Services Group", title: "Chief Data, AI, and Operations Officer", phone: "(401) 214-7853", mobile: false },
  { name: "Tilak Mandadi", company: "CVS", title: "EVP – Chief Digital Data Analytics & Technology Officer", phone: "+1 860-785-4641", mobile: true },
  { name: "Susan Doniz", company: "Walt Disney", title: "Chief Information & Data Officer", phone: "818-726-9161", mobile: false },
  { name: "Kim Hales", company: "NRG Energy Inc", title: "Chief Data and AI Officer", phone: "(713) 537-1223", mobile: false },
  { name: "Pawan Verma", company: "Cencora", title: "EVP, Global Chief Data and Information Officer", phone: "(612) 210-0390", mobile: true },
];

function renderContacts() {
  const list = document.getElementById('contact-list');
  contacts.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'contact-card';
    card.innerHTML = `
      <div class="contact-left">
        <div class="contact-name">${c.name}</div>
        <div class="contact-meta"><span class="contact-company">${c.company}</span> &bull; ${c.title}</div>
        <div class="copy-line">${c.name}, ${c.company}, ${c.title}, ${c.phone}</div>
      </div>
      <div class="contact-right">
        <span class="phone-badge ${c.mobile ? 'mobile' : ''}">${c.phone}</span>
        <span class="phone-type">${c.mobile ? 'Mobile' : 'Office/Direct'}</span>
      </div>
    `;
    list.appendChild(card);
  });
}

function buildExportText() {
  return contacts.map(c => `${c.name}, ${c.company}, ${c.title}, ${c.phone}`).join('\n');
}

function copyAll() {
  const text = buildExportText();
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy All for Keith'; btn.classList.remove('copied'); }, 2000);
  });
}

function toggleExport() {
  const box = document.getElementById('keith-export');
  const btn = document.querySelector('.btn-show-export');
  if (box.style.display === 'block') {
    box.style.display = 'none';
    btn.textContent = 'Show Keith Export';
  } else {
    document.getElementById('export-text').textContent = buildExportText();
    box.style.display = 'block';
    btn.textContent = 'Hide Export';
  }
}

renderContacts();
</script>
</body>
</html>
